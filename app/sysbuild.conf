# MCUboot is the first-stage bootloader on every OpenDeck target.
#
# Firmware-updater mode intentionally reserves slot1_partition for the
# OpenDeck bootloader/recovery image. Runtime firmware uploads use OpenDeck
# staging storage when they originate from the app; recovery-mode uploads can
# write the slot0 application image directly.
SB_CONFIG_BOOTLOADER_MCUBOOT=y
SB_CONFIG_MCUBOOT_MODE_FIRMWARE_UPDATER=y
SB_CONFIG_MCUBOOT_MODE_FIRMWARE_UPDATER_BOOT_MODE_ENTRANCE=y
SB_CONFIG_FIRMWARE_LOADER_IMAGE_OPENDECK=y
