CONFIG_USE_DT_CODE_PARTITION=y
CONFIG_POLL=y
CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_NET_BUF=y
CONFIG_ASSERT=n
CONFIG_BOOT_BANNER=n
