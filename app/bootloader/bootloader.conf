# Zephyr
CONFIG_GPIO=y
CONFIG_USE_DT_CODE_PARTITION=y
CONFIG_POLL=y
CONFIG_ASSERT=n
CONFIG_BOOT_BANNER=n
CONFIG_NO_RUNTIME_CHECKS=y
CONFIG_PRINTK=n
CONFIG_CONSOLE=n
CONFIG_LOG=n
CONFIG_SERIAL=n
CONFIG_UART_CONSOLE=n
CONFIG_UART_INTERRUPT_DRIVEN=n
CONFIG_PICOLIBC_IO_LONG_LONG=n
CONFIG_RETENTION_BOOT_MODE=y
CONFIG_CRC_HW_HANDLER=n

# zlibs
CONFIG_ZLIBS_UTILS_SIGNALING=y
CONFIG_ZLIBS_UTILS_SIGNALING_MAX_PAYLOAD_LENGTH_BYTES=128
CONFIG_ZLIBS_UTILS_SIGNALING_MAX_POOL_SIZE=4
CONFIG_ZLIBS_UTILS_SIGNALING_THREAD_PRIORITY=5
CONFIG_ZLIBS_UTILS_SIGNALING_THREAD_STACK_SIZE=512
