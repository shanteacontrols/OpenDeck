CONFIG_USE_DT_CODE_PARTITION=y

# Ethernet network bring-up.
CONFIG_NETWORKING=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_IPV6=n
CONFIG_NET_PKT_RX_COUNT=16
CONFIG_NET_PKT_TX_COUNT=16
CONFIG_NET_BUF_RX_COUNT=48
CONFIG_NET_BUF_TX_COUNT=48
CONFIG_NET_MAX_CONN=8
# mDNS responder callbacks run on Zephyr's socket service thread.
CONFIG_NET_SOCKETS_SERVICE_STACK_SIZE=2048

CONFIG_HEAP_MEM_POOL_SIZE=4096
CONFIG_HTTP_SERVER_MAX_CLIENTS=2
CONFIG_WEBSOCKET_MAX_CONTEXTS=2
CONFIG_ZVFS_EVENTFD_MAX=2
CONFIG_ZVFS_POLL_MAX=8
