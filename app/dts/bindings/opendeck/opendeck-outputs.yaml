description: OpenDeck OUTPUT inventory and topology

compatible: "opendeck,outputs"

properties:
  mode:
    type: string
    required: false
    enum:
      - native
      - shift-register
      - matrix
      - max7219
    description: Physical OUTPUT output topology.

  touchscreen-components:
    type: int
    required: false
    default: 0
    description: Number of touchscreen-driven OUTPUT-like components. Used only when touchscreen is used.

  native-gpios:
    type: phandle-array
    required: false
    description: Direct GPIO outputs for native external OUTPUT topology.

  shift-registers:
    type: int
    required: false
    description: Number of cascaded shift registers for external OUTPUT shift-register topology.

  data-gpios:
    type: phandle-array
    required: false
    description: Serial data output for shift-register or MAX7219 OUTPUT topology.

  clock-gpios:
    type: phandle-array
    required: false
    description: Shift or serial clock for shift-register or MAX7219 OUTPUT topology.

  latch-gpios:
    type: phandle-array
    required: false
    description: Latch or chip-select control for shift-register or MAX7219 OUTPUT topology.

  enable-gpios:
    type: phandle-array
    required: false
    description: Optional output enable control for shift-register OUTPUT topology.

  rows:
    type: int
    required: false
    description: Number of matrix OUTPUT rows.

  columns:
    type: int
    required: false
    description: Number of matrix OUTPUT columns.

  row-gpios:
    type: phandle-array
    required: false
    description: Matrix OUTPUT row outputs.

  column-gpios:
    type: phandle-array
    required: false
    description: Matrix OUTPUT column outputs.

  drivers:
    type: int
    required: false
    description: Number of MAX7219 OUTPUT drivers.

  index-remap:
    type: array
    required: false
    description: Optional physical-to-logical OUTPUT index remap table.
