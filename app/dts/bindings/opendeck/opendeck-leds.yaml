description: OpenDeck LED inventory and topology

compatible: "opendeck,leds"

properties:
  mode:
    type: string
    required: false
    enum:
      - native
      - shift-register
      - matrix
      - max7219
    description: Physical LED output topology.

  touchscreen-components:
    type: int
    required: false
    default: 0
    description: Number of touchscreen-driven LED-like components. Used only when touchscreen is used.

  native-gpios:
    type: phandle-array
    required: false
    description: Direct GPIO outputs for native external LED topology.

  shift-registers:
    type: int
    required: false
    description: Number of cascaded shift registers for external LED shift-register topology.

  data-gpios:
    type: phandle-array
    required: false
    description: Serial data output for shift-register or MAX7219 LED topology.

  clock-gpios:
    type: phandle-array
    required: false
    description: Shift or serial clock for shift-register or MAX7219 LED topology.

  latch-gpios:
    type: phandle-array
    required: false
    description: Latch or chip-select control for shift-register or MAX7219 LED topology.

  enable-gpios:
    type: phandle-array
    required: false
    description: Optional output enable control for shift-register LED topology.

  rows:
    type: int
    required: false
    description: Number of matrix LED rows.

  columns:
    type: int
    required: false
    description: Number of matrix LED columns.

  row-gpios:
    type: phandle-array
    required: false
    description: Matrix LED row outputs.

  column-gpios:
    type: phandle-array
    required: false
    description: Matrix LED column outputs.

  drivers:
    type: int
    required: false
    description: Number of MAX7219 LED drivers.

  index-remap:
    type: array
    required: false
    description: Optional physical-to-logical LED index remap table.
