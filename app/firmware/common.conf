# Zephyr
CONFIG_CPP=y
CONFIG_STD_CPP20=y
CONFIG_REQUIRES_FULL_LIBCPP=y
CONFIG_GLIBCXX_LIBCPP=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_HWINFO=y
CONFIG_REBOOT=y
CONFIG_RETAINED_MEM=y
CONFIG_RETENTION=y
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_MPU_ALLOW_FLASH_WRITE=y
CONFIG_ADC=y
CONFIG_POLL=y
CONFIG_I2C=y
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_TIMESLICE_SIZE=10
CONFIG_CRC_HW_HANDLER=n

# zlibs
CONFIG_ZLIBS_UTILS_MISC=y
CONFIG_ZLIBS_UTILS_LESSDB=y
CONFIG_ZLIBS_UTILS_EMUEEPROM=y
CONFIG_ZLIBS_UTILS_FILTERS=y
CONFIG_ZLIBS_UTILS_MIDI=y
CONFIG_ZLIBS_UTILS_SIGNALING=y
CONFIG_ZLIBS_UTILS_SIGNALING_MAX_PAYLOAD_LENGTH_BYTES=96
CONFIG_ZLIBS_UTILS_SIGNALING_MAX_POOL_SIZE=32
CONFIG_ZLIBS_UTILS_SIGNALING_THREAD_PRIORITY=-1
CONFIG_ZLIBS_UTILS_SIGNALING_THREAD_STACK_SIZE=4096
CONFIG_ZLIBS_UTILS_SYSEX_CONF=y
