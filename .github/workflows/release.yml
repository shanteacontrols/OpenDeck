name: Deploy

on:
  release:
    types: [created]

jobs:
  devcontainer:
    name: Devcontainer image
    uses: ./.github/workflows/devcontainer-image.yml
  app-targets:
    name: App targets
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.targets.outputs.targets }}
    steps:
      - name: Pull the repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: List app targets
        id: targets
        run: |
          set -euo pipefail
          targets=$(./scripts/bulk_build.sh --type=app --print-target-matrix)
          echo "targets=${targets}" >> "${GITHUB_OUTPUT}"
  app:
    name: App
    needs:
      - app-targets
      - devcontainer
    uses: ./.github/workflows/app-build.yml
    with:
      image_name: ${{ needs.devcontainer.outputs.image_name }}
      image_tag: ${{ needs.devcontainer.outputs.image_tag }}
      targets: ${{ needs.app-targets.outputs.targets }}
  attach:
    name: Attach firmware to release
    runs-on: ubuntu-latest
    needs: app
    permissions:
      actions: read
      contents: write
    steps:
      - name: Download firmware artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: release-*
          path: release
          merge-multiple: true
      - name: Upload binaries to GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.event.release.tag_name }}
          artifacts: release/*
          allowUpdates: true
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
